<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FocusFlow</title>
</head>
<body>
    <header>
        <section>
            <div>
                <a href="../index.html">FocusFlow</a>
            </div>

            <div>
                <h1>Accedé a tu cuenta</h1>
                <p>Gestioná tus tareas, proyectos y hábitos desde un solo lugar.</p>
            </div>
        </section>
    </header>
    <main>
        <section>
            <div>
                <form action="" method="post">

                    <h2>Iniciar sesión</h2>

                    <label for="username">Usuario o email</label><br>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        autocomplete="username"
                        placeholder="ejemplo@email.com"><br>

                    <label for="password">Contraseña</label><br>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        autocomplete="current-password"
                        placeholder="Ingresá tu contraseña"><br>

                    <a href="#">¿Olvidaste tu contraseña?</a><br><br>

                    <input type="submit" value="Iniciar sesión">

                </form>
            </div>
            <div>
             <p>O continuá con</p>   
            </div>
             <div>
                <div>
                    <a href="#">Continuar con Google</a>
                    <a href="#">Continuar con Microsoft</a>
                    <a href="#">Continuar con GitHub</a>
                </div>
            </div>  
        </section>
        <section>
             <div>
                <p>¿Ya tenés una cuenta?</p>
                <a href="./sign_in.html">Ingresa a tu cuenta</a>
            </div>  
        </section>
    </main>
</body>
</html>
